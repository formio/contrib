name: Purge jsDelivr cache

# jsDelivr caches branch-pinned URLs for ~12 hours. Without this workflow,
# downstream apps (Drift, the Form.io portal) wouldn't see contrib changes
# until the cache lapsed — forcing us to commit-pin URLs and bump them
# manually on every push. This purges the cache so the branch URL behaves
# like a live channel.
#
# The free purge endpoint rate-limits to ~one request per file per 14 min.
# For solo development that's never an issue; back-to-back pushes will see
# the second request wait in line.

on:
  push:
    branches: [add-card-component]
    paths:
      - 'dist/**'

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge contrib bundle and stylesheet
        run: |
          BASE='https://purge.jsdelivr.net/gh/emeryporter/card-component@add-card-component/dist'
          for FILE in formio-contrib.use.min.js formio-contrib.css; do
            echo "Purging $FILE..."
            curl -fsSL "$BASE/$FILE" || echo "  (purge failed, likely rate-limited — cache will refresh on its own)"
          done
